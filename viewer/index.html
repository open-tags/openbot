<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Interactive 3D viewer for the OpenBot assembly.">
    <title>OpenBot 3D Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
    <style>
      :root { color-scheme: dark; font-family: system-ui, sans-serif; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body { background: #080808; color: #f5f5f5; }
      header {
        position: fixed;
        z-index: 1;
        inset: 0 0 auto 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1.25rem;
        background: linear-gradient(#080808e8, transparent);
      }
      h1 { margin: 0; font-size: 1rem; letter-spacing: .08em; text-transform: uppercase; }
      a { color: #d9bd67; }
      model-viewer { width: 100%; height: 100%; --poster-color: #080808; }
      .hint {
        position: fixed;
        inset: auto 1rem 1rem auto;
        margin: 0;
        color: #aaa;
        font-size: .8rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>OpenBot</h1>
      <a href="https://cad.onshape.com/documents/432dec42a257744f3b8f22d9/w/829cba9d7a4b997211a6277e/e/69cb96d6d8647e33e3457e0e">Open CAD</a>
    </header>
    <model-viewer
      src="../cad/openbot_assembly.gltf"
      poster="../cad/openbot-top.png"
      alt="Interactive 3D model of the OpenBot assembly"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1.1"
      interaction-prompt="auto">
    </model-viewer>
    <p class="hint">Drag to orbit · Scroll to zoom</p>
  </body>
</html>
