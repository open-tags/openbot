; XIAO ESP32-S3 — BNO085 angle printer
; Flash over USB-C:  ./deploy.sh   (build + upload + monitor)

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Native USB-C CDC serial (so Serial works over the USB-C port directly)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit BNO08x@^1.2.5
