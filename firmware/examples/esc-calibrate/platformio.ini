; XIAO ESP32-S3 — single ESC throttle calibration (D0)
[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    madhephaestus/ESP32Servo@^3.0.6
