; XIAO ESP32-S3 - simple software-pulse forward/back test
; Build:  pio run -d demo/simple_scripts
; Flash:  pio run -d demo/simple_scripts -t upload
; Monitor: pio device monitor -d demo/simple_scripts

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
upload_speed = 921600
