; XIAO ESP32-S3 - Jetson serial bridge for OpenBot bring-up
; Build:   pio run -d firmware/control
; Flash:   pio run -d firmware/control -t upload --upload-port /dev/cu.usbmodemXXXX
; Monitor: pio device monitor -d firmware/control --port /dev/cu.usbmodemXXXX

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    adafruit/Adafruit BNO08x@^1.2.5
